# Cloud Run service definition for n8n
# Deploy: gcloud run services replace n8n/service.yaml --project <PROJECT_ID> --region us-central1
#
# Before deploying, update:
#   1. The env vars marked CHANGEME
#   2. The service account email
#   3. The image tag (n8nio/n8n version)

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: n8n
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/invoker-iam-disabled: 'true'
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: '1'
        autoscaling.knative.dev/maxScale: '1'
        run.googleapis.com/cpu-throttling: 'false'
        run.googleapis.com/sessionAffinity: 'true'
        run.googleapis.com/startup-cpu-boost: 'true'
    spec:
      containerConcurrency: 160
      timeoutSeconds: 3600
      containers:
        - image: n8nio/n8n:2.8.3
          ports:
            - containerPort: 5678
              name: http1
          resources:
            limits:
              cpu: 1000m
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /health
              port: 5678
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          env:
            # ── Static config ──
            - name: GENERIC_TIMEZONE
              value: America/Bogota
            - name: N8N_PORT
              value: '5678'
            - name: N8N_PROTOCOL
              value: https
            - name: N8N_PUSH_BACKEND
              value: websocket
            - name: N8N_SECURE_COOKIE
              value: 'false'
            - name: N8N_ENDPOINT_HEALTH
              value: health
            - name: N8N_METRICS
              value: 'false'
            - name: EXECUTIONS_DATA_SAVE_ON_ERROR
              value: none
            - name: EXECUTIONS_DATA_SAVE_ON_SUCCESS
              value: none
            - name: EXECUTIONS_DATA_SAVE_MANUAL_EXECUTION
              value: 'false'
            - name: DB_TYPE
              value: postgresdb
            - name: DB_POSTGRESDB_PORT
              value: '5432'
            - name: DB_POSTGRESDB_DATABASE
              value: postgres
            - name: DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED
              value: 'false'
            - name: DB_POSTGRESDB_CONNECTION_TIMEOUT_MS
              value: '30000'
            - name: DB_POSTGRESDB_TIMEOUT
              value: '30000'
            - name: DB_POSTGRESDB_POOLSIZE_MAX
              value: '5'
            - name: N8N_EXECUTIONS_PROCESS
              value: main
            - name: EXECUTIONS_DATA_PRUNE
              value: 'true'
            - name: EXECUTIONS_DATA_MAX_AGE
              value: '168'
            - name: N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS
              value: 'false'
            - name: N8N_ATTRIBUTION_ENABLED
              value: 'false'
            # ── CHANGEME: Secrets (inject per environment) ──
            - name: DB_POSTGRESDB_HOST
              value: CHANGEME
            - name: DB_POSTGRESDB_USER
              value: CHANGEME
            - name: DB_POSTGRESDB_PASSWORD
              value: CHANGEME
            - name: N8N_ENCRYPTION_KEY
              value: CHANGEME
            - name: WEBHOOK_URL
              value: CHANGEME
            - name: N8N_EDITOR_BASE_URL
              value: CHANGEME
  traffic:
    - latestRevision: true
      percent: 100
