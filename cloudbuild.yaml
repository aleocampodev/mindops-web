steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '--build-arg', 'NEXT_PUBLIC_SUPABASE_URL=$_SUPABASE_URL',
      '--build-arg', 'NEXT_PUBLIC_SUPABASE_ANON_KEY=$_SUPABASE_KEY',
      '-t', 'gcr.io/$PROJECT_ID/mindops-web',
      '.'
    ]
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/mindops-web']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args: [
      'run', 'deploy', 'mindops-web',
      '--image', 'gcr.io/$PROJECT_ID/mindops-web',
      '--region', 'us-central1',
      '--platform', 'managed',
      '--quiet'
    ]
images:
  - 'gcr.io/$PROJECT_ID/mindops-web'